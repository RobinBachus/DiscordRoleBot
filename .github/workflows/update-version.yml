name: Update version.txt

on:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    update-version:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Write version.txt
              run: echo "${{ github.event.release.name }}" > version.txt

            - name: Commit and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add version.txt
                  git diff --staged --quiet || git commit -m "chore: set version.txt to ${{ github.event.release.name }}"
                  git push
